version: 2.1
jobs:
  build:
    docker:
      - image: cimg/node:24.18-browsers
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Test install
          command: npm install
      - run:
          name: typecheck
          command: npm run typecheck
      - run:
          name: run all tests
          command: npm test
      - store_artifacts:
          path: coverage
      - run:
          name: Smoketest - clean install without devDependencies
          command: |
            rm -rf node_modules package-lock.json
            npm install --omit=dev

  # Deploy to Cloudflare Pages — ONLY from `main`, only after `build` (tests)
  # passes. Mirrors the web-jam-tools#130 pattern (CI as the single deploy
  # gate) — deliberately NOT Cloudflare's GitHub integration, which deploys
  # independently of CI. Auth via the CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID
  # CircleCI project env vars (see README "Deploying" section).
  deploy:
    docker:
      - image: cimg/node:24.18-browsers
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Check required Cloudflare env vars
          command: |
            missing=""
            [ -z "$CLOUDFLARE_API_TOKEN" ] && missing="$missing CLOUDFLARE_API_TOKEN"
            [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && missing="$missing CLOUDFLARE_ACCOUNT_ID"
            if [ -n "$missing" ]; then
              echo "ERROR: missing required CircleCI env var(s):$missing"
              echo "Set these as CircleCI project environment variables before this job can deploy."
              exit 1
            fi
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build
          command: npm run build
      - run:
          name: Deploy to Cloudflare Pages
          command: npx wrangler pages deploy dist --project-name timshermanmusic --branch main

workflows:
  build-and-test:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: main
